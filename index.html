<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidyaAI — Elite AI Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07060a;--bg2:#0c0b10;--bg3:#111018;
  --card:rgba(255,255,255,0.03);--card2:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.07);--border2:rgba(201,168,76,0.2);
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f7e6b0;--gold-dim:rgba(201,168,76,0.5);
  --text:#f2ede4;--text2:#8a8178;--text3:#4a453e;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
  --glass:rgba(15,13,20,0.85);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s;}
#loader.hide{opacity:0;pointer-events:none;}
.loader-logo{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2rem;}
.loader-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.loader-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));animation:loadBar 2s ease forwards;}
@keyframes loadBar{from{width:0}to{width:100%}}
.loader-sub{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);margin-top:1rem;}

/* LOGIN OVERLAY */
#loginOverlay{position:fixed;inset:0;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);z-index:8000;display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:480px;position:relative;box-shadow:0 40px 100px rgba(0,0,0,.8);}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:.25rem;}
.login-tagline{text-align:center;font-size:.75rem;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2.5rem;}
.login-tabs{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:2rem;}
.ltab{flex:1;padding:.55rem;border:none;background:transparent;color:var(--text2);font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;border-radius:8px;transition:all .2s;letter-spacing:.03em;}
.ltab.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:700;}
.login-form{display:flex;flex-direction:column;gap:1rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.inp-wrap{display:flex;flex-direction:column;gap:.4rem;}
.inp-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);font-weight:600;}
.inp{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s;width:100%;font-weight:300;}
.inp:focus{border-color:var(--gold-dim);}
.inp::placeholder{color:var(--text3);}
select.inp{cursor:pointer;}
.login-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;padding:.9rem;border-radius:10px;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .25s;box-shadow:0 0 40px rgba(201,168,76,.2);margin-top:.5rem;letter-spacing:.04em;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 0 60px rgba(201,168,76,.4);}
.google-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:.75rem;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.6rem;}
.google-btn:hover{border-color:var(--border2);background:rgba(255,255,255,.09);}
.divider{display:flex;align-items:center;gap:.75rem;color:var(--text3);font-size:.72rem;letter-spacing:.08em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.login-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:.65rem 1rem;font-size:.78rem;color:var(--red);display:none;}

/* CANVAS / AMBIENT */
#starCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px);}
.amb1{width:700px;height:700px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(201,168,76,.04),transparent 70%);animation:ambF1 18s ease-in-out infinite alternate;}
.amb2{width:500px;height:500px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(201,168,76,.03),transparent 70%);animation:ambF2 22s ease-in-out infinite alternate;}
@keyframes ambF1{to{transform:translate(60px,40px);}}
@keyframes ambF2{to{transform:translate(-40px,-60px);}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(7,6,10,.85);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);}
.nav-brand{display:flex;align-items:center;gap:.65rem;cursor:pointer;}
.nav-gem{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;display:grid;place-items:center;font-size:.85rem;}
.nav-wordmark{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--text2);text-decoration:none;font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;cursor:pointer;}
.nav-links a:hover{color:var(--gold);}
.nav-right{display:flex;gap:.75rem;align-items:center;}
.nav-student-info{display:flex;align-items:center;gap:.6rem;background:rgba(201,168,76,.07);border:1px solid var(--border2);border-radius:100px;padding:.35rem .9rem;}
.nav-stu-name{font-size:.75rem;font-weight:600;color:var(--gold);}
.nav-stu-class{font-size:.65rem;color:var(--text2);}
.nav-pill{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;padding:.45rem 1.2rem;border-radius:100px;font-family:'Inter',sans-serif;font-weight:700;font-size:.72rem;cursor:pointer;transition:all .2s;}
.nav-pill:hover{opacity:.88;}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:.4rem .9rem;border-radius:100px;font-size:.72rem;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* TOOL BAR */
#toolBar{position:fixed;bottom:0;left:0;right:0;z-index:400;background:rgba(7,6,10,.92);backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:.5rem 2rem;display:flex;align-items:center;gap:.75rem;overflow-x:auto;}
.tool-btn{display:flex;align-items:center;gap:.45rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.45rem .9rem;font-size:.72rem;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'Inter',sans-serif;}
.tool-btn:hover,.tool-btn.on{background:rgba(201,168,76,.08);border-color:var(--border2);color:var(--gold);}
.tool-btn .t-icon{font-size:.9rem;}
#toolBar .bar-label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding-right:.5rem;border-right:1px solid var(--border);margin-right:.25rem;white-space:nowrap;}

/* PANELS */
.panel{position:fixed;bottom:60px;right:1.5rem;z-index:600;background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:1.5rem;width:340px;max-height:480px;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.7);display:none;animation:panelPop .3s cubic-bezier(.34,1.56,.64,1) both;}
.panel.show{display:block;}
@keyframes panelPop{from{opacity:0;transform:scale(.9) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;}
.panel-close{background:transparent;border:none;color:var(--text2);font-size:1.1rem;cursor:pointer;padding:.2rem .4rem;border-radius:5px;transition:color .2s;}
.panel-close:hover{color:var(--red);}
.panel::-webkit-scrollbar{width:3px;}
.panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* NOTES */
.note-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.8rem;resize:none;outline:none;margin-bottom:.75rem;height:80px;font-weight:300;}
.note-inp:focus{border-color:var(--gold-dim);}
.note-card{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.12);border-radius:10px;padding:.75rem 1rem;margin-bottom:.6rem;font-size:.78rem;line-height:1.6;position:relative;}
.note-card-time{font-size:.62rem;color:var(--text3);font-family:'Space Mono',monospace;margin-top:.4rem;}
.note-del{position:absolute;top:.5rem;right:.5rem;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;transition:color .2s;}
.note-del:hover{color:var(--red);}

/* HOMEWORK */
.hw-row{display:flex;gap:.6rem;margin-bottom:.65rem;}
.hw-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.55rem .8rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.78rem;outline:none;}
.hw-inp:focus{border-color:var(--gold-dim);}
.hw-add{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:8px;padding:.55rem .9rem;font-weight:700;font-size:.75rem;cursor:pointer;white-space:nowrap;}
.hw-item{display:flex;align-items:center;gap:.6rem;padding:.65rem .75rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;margin-bottom:.5rem;cursor:pointer;transition:all .2s;}
.hw-item.done{opacity:.5;text-decoration:line-through;}
.hw-item:hover{border-color:var(--border2);}
.hw-check{width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);display:grid;place-items:center;font-size:.65rem;flex-shrink:0;background:rgba(201,168,76,.07);}
.hw-item.done .hw-check{background:var(--gold);color:#000;}
.hw-text{font-size:.78rem;flex:1;}
.hw-due{font-size:.62rem;font-family:'Space Mono',monospace;color:var(--text3);}

/* BOOKMARKS */
.bm-card{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.15);border-radius:10px;padding:.75rem 1rem;margin-bottom:.6rem;font-size:.78rem;line-height:1.6;position:relative;cursor:pointer;transition:all .2s;}
.bm-card:hover{border-color:rgba(59,130,246,.3);}
.bm-subject{font-size:.62rem;font-family:'Space Mono',monospace;color:var(--blue);margin-bottom:.25rem;}
.bm-del{position:absolute;top:.5rem;right:.5rem;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;}
.bm-del:hover{color:var(--red);}

/* POMODORO */
.pomo-display{text-align:center;padding:1.5rem 0;}
.pomo-time{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.pomo-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-top:.5rem;}
.pomo-btns{display:flex;gap:.6rem;justify-content:center;margin-top:1.25rem;}
.pomo-btn{background:rgba(201,168,76,.08);border:1px solid var(--border2);color:var(--gold);border-radius:8px;padding:.55rem 1.2rem;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;}
.pomo-btn:hover{background:rgba(201,168,76,.18);}
.pomo-btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-color:transparent;}
.pomo-presets{display:flex;gap:.5rem;justify-content:center;margin-top:.75rem;}
.pomo-preset{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:.35rem .75rem;font-size:.7rem;cursor:pointer;color:var(--text2);transition:all .2s;}
.pomo-preset:hover,.pomo-preset.on{border-color:var(--border2);color:var(--gold);}
.pomo-sessions{font-size:.72rem;color:var(--text2);text-align:center;margin-top:.75rem;}
.pomo-ring{width:120px;height:120px;margin:0 auto 1rem;}
.pomo-svg{width:120px;height:120px;}
.pomo-ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8;}
.pomo-ring-fill{fill:none;stroke:url(#pomoGrad);stroke-width:8;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .5s ease;}

/* CERTIFICATE */
.cert-wrap{padding:.5rem 0;}
.cert-card{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.03));border:1px solid var(--border2);border-radius:14px;padding:1.5rem;text-align:center;position:relative;overflow:hidden;}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.cert-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.25rem;}
.cert-sub{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);}
.cert-name{font-size:1.1rem;font-weight:700;margin:.75rem 0 .25rem;}
.cert-detail{font-size:.78rem;color:var(--text2);line-height:1.7;}
.cert-seal{font-size:2.5rem;margin:.75rem 0;}
.cert-download{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;padding:.65rem 1.5rem;border-radius:8px;font-family:'Inter',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;margin-top:1rem;letter-spacing:.04em;}
.cert-stats{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:.75rem 0;}
.cert-stat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.6rem;text-align:center;}
.cert-stat-val{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--gold);}
.cert-stat-lbl{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}

/* LANG SELECTOR */
#langBar{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:450;background:rgba(7,6,10,.92);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:100px;padding:.45rem 1.25rem;display:flex;align-items:center;gap:.75rem;}
.lang-label{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600;white-space:nowrap;}
#langSelect{background:transparent;border:none;color:var(--text);font-size:.75rem;font-family:'Inter',sans-serif;outline:none;cursor:pointer;}
#langSelect option{background:#0c0b10;}
#speakToggle{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:50%;color:var(--gold);width:26px;height:26px;display:grid;place-items:center;cursor:pointer;font-size:.8rem;transition:all .2s;font-family:inherit;}
#speakToggle:hover{background:rgba(201,168,76,.2);}

/* MAIN APP */
#app{display:none;}

/* HERO */
.hero{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem 2rem 6rem;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:.7rem;background:rgba(201,168,76,.06);border:1px solid var(--border2);padding:.4rem 1.2rem;border-radius:100px;font-size:.68rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:3rem;animation:rIn .9s ease both;}
.hero-eyebrow span{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:gP 2s infinite;}
@keyframes gP{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.5);}50%{box-shadow:0 0 0 8px rgba(201,168,76,0);}}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,8vw,6.5rem);font-weight:700;line-height:1.05;letter-spacing:-.03em;margin-bottom:1.5rem;animation:rIn .9s .1s ease both;}
.hero-title .g{background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:.98rem;color:var(--text2);max-width:460px;line-height:1.85;font-weight:300;margin-bottom:3rem;animation:rIn .9s .2s ease both;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;animation:rIn .9s .3s ease both;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;padding:.9rem 2.2rem;border-radius:100px;font-family:'Inter',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.05em;cursor:pointer;transition:all .3s;box-shadow:0 0 40px rgba(201,168,76,.2);}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 0 70px rgba(201,168,76,.4);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border2);padding:.9rem 2.2rem;border-radius:100px;font-family:'Inter',sans-serif;font-weight:500;font-size:.85rem;cursor:pointer;transition:all .25s;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.welcome-card{background:rgba(201,168,76,.05);border:1px solid var(--border2);border-radius:20px;padding:2rem 2.5rem;text-align:left;max-width:600px;width:100%;margin-top:3rem;animation:rIn .9s .4s ease both;}
.wc-greeting{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;margin-bottom:.5rem;}
.wc-info{display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:1rem;}
.wc-badge{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--text2);}
.wc-badge strong{color:var(--gold);}
@keyframes rIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* SECTIONS */
.sec-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);}
.sticky-bar{position:sticky;top:64px;z-index:100;background:rgba(7,6,10,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:.55rem 2.5rem;display:flex;align-items:center;gap:1rem;}
.s-num{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--gold);background:rgba(201,168,76,.08);border:1px solid var(--border2);padding:.2rem .55rem;border-radius:4px;letter-spacing:.08em;}
.s-name{font-size:.72rem;color:var(--text2);font-weight:500;}
.sec-wrap{position:relative;z-index:2;padding:5rem 2rem;max-width:1280px;margin:0 auto;}
.sec-label{display:flex;align-items:center;gap:.65rem;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem;font-weight:600;}
.sec-label::before{content:'';width:18px;height:1px;background:var(--gold);}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4.5vw,3.5rem);font-weight:700;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem;}
.sec-sub{color:var(--text2);font-size:.88rem;line-height:1.85;max-width:440px;font-weight:300;}

/* SUBJECTS */
.subj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;mar
